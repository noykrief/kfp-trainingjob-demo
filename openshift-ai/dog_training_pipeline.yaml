# PIPELINE DEFINITION
# Name: dog-breed-classifier-training
# Description: Train a CNN model to classify dog breeds on OpenShift AI
# Inputs:
#    batch_size: int [Default: 32.0]
#    epochs: int [Default: 10.0]
#    learning_rate: float [Default: 0.001]
#    pvc_name: str [Default: 'kfp-pvc-1']
#    use_pretrained: bool [Default: True]
components:
  comp-train-dog-classifier:
    executorLabel: exec-train-dog-classifier
    inputDefinitions:
      parameters:
        batch_size:
          defaultValue: 32.0
          description: Batch size for training
          isOptional: true
          parameterType: NUMBER_INTEGER
        data_dir:
          defaultValue: /data
          description: Directory containing training data
          isOptional: true
          parameterType: STRING
        epochs:
          defaultValue: 10.0
          description: Number of training epochs
          isOptional: true
          parameterType: NUMBER_INTEGER
        learning_rate:
          defaultValue: 0.001
          description: Learning rate for optimizer
          isOptional: true
          parameterType: NUMBER_DOUBLE
        model_dir:
          defaultValue: /models
          description: Directory to save trained models
          isOptional: true
          parameterType: STRING
        use_pretrained:
          defaultValue: true
          description: Use pretrained ResNet18 weights
          isOptional: true
          parameterType: BOOLEAN
    outputDefinitions:
      artifacts:
        metrics_out:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-train-dog-classifier:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_dog_classifier
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'torchvision>=0.15.0'\
          \ 'Pillow>=9.0.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_dog_classifier(\n    data_dir: str = \"/data\",\n    model_dir:\
          \ str = \"/models\",\n    epochs: int = 10,\n    batch_size: int = 32,\n\
          \    learning_rate: float = 0.001,\n    use_pretrained: bool = True,\n \
          \   metrics_out: dsl.Output[dsl.Metrics] = None\n):\n    \"\"\"\n    Train\
          \ dog breed classifier using PyTorch\n\n    Args:\n        data_dir: Directory\
          \ containing training data\n        model_dir: Directory to save trained\
          \ models\n        epochs: Number of training epochs\n        batch_size:\
          \ Batch size for training\n        learning_rate: Learning rate for optimizer\n\
          \        use_pretrained: Use pretrained ResNet18 weights\n    \"\"\"\n \
          \   import os\n    import json\n    import torch\n    import torch.nn as\
          \ nn\n    import torch.optim as optim\n    from torch.utils.data import\
          \ DataLoader\n    from torchvision import datasets, transforms, models\n\
          \    from datetime import datetime\n    from PIL import Image\n    import\
          \ random\n\n    # Create sample dataset function\n    def create_sample_dataset(data_dir,\
          \ num_samples_per_breed=100):\n        \"\"\"Generate synthetic dog images\
          \ for demo purposes\"\"\"\n        breeds = ['labrador', 'golden_retriever',\
          \ 'german_shepherd', 'bulldog', 'poodle']\n\n        train_dir = os.path.join(data_dir,\
          \ 'train')\n        val_dir = os.path.join(data_dir, 'val')\n\n        print(f\"\
          \ Creating dataset in: {data_dir}\")\n\n        for split_dir in [train_dir,\
          \ val_dir]:\n            for breed in breeds:\n                breed_dir\
          \ = os.path.join(split_dir, breed)\n                os.makedirs(breed_dir,\
          \ exist_ok=True)\n\n                num_samples = num_samples_per_breed\
          \ if split_dir == train_dir else num_samples_per_breed // 5\n\n        \
          \        for i in range(num_samples):\n                    img_path = os.path.join(breed_dir,\
          \ f'{breed}_{i:04d}.jpg')\n\n                    if not os.path.exists(img_path):\n\
          \                        # Create synthetic image (in production, use real\
          \ images)\n                        img = Image.new('RGB', (224, 224),\n\
          \                                      color=(random.randint(50, 255),\n\
          \                                            random.randint(50, 255),\n\
          \                                            random.randint(50, 255)))\n\
          \                        img.save(img_path, quality=85)\n\n        print(f\"\
          \ Dataset created: {len(breeds)} breeds\")\n        print(f\"   Training:\
          \ {num_samples_per_breed * len(breeds)} images\")\n        print(f\"   Validation:\
          \ {(num_samples_per_breed // 5) * len(breeds)} images\")\n\n        return\
          \ breeds\n\n    # Model definition\n    class DogBreedClassifier(nn.Module):\n\
          \        \"\"\"ResNet18-based dog breed classifier\"\"\"\n        def __init__(self,\
          \ num_classes=5, pretrained=False):\n            super(DogBreedClassifier,\
          \ self).__init__()\n            self.backbone = models.resnet18(pretrained=pretrained)\n\
          \            num_features = self.backbone.fc.in_features\n            self.backbone.fc\
          \ = nn.Linear(num_features, num_classes)\n\n        def forward(self, x):\n\
          \            return self.backbone(x)\n\n    # Main training logic\n    print(\"\
          =\" * 70)\n    print(\" DOG BREED CLASSIFICATION TRAINING\")\n    print(\"\
          =\" * 70)\n    print(f\"Started: {datetime.now()}\")\n    print(f\"Data:\
          \ {data_dir}\")\n    print(f\"Models: {model_dir}\")\n    print(f\"Epochs:\
          \ {epochs} | Batch: {batch_size} | LR: {learning_rate}\")\n    print(\"\
          =\" * 70)\n\n    # Create directories\n    os.makedirs(model_dir, exist_ok=True)\n\
          \n    # Check/create dataset\n    train_path = os.path.join(data_dir, 'train')\n\
          \    if not os.path.exists(train_path) or len(os.listdir(train_path)) ==\
          \ 0:\n        print(\"\\n Creating sample dataset...\")\n        breeds\
          \ = create_sample_dataset(data_dir)\n    else:\n        print(\"\\n Using\
          \ existing dataset\")\n        breeds = sorted([d for d in os.listdir(train_path)\n\
          \                        if os.path.isdir(os.path.join(train_path, d))])\n\
          \n    num_classes = len(breeds)\n    print(f\"\\n Training for {num_classes}\
          \ breeds: {', '.join(breeds)}\")\n\n    # Setup device\n    device = torch.device('cuda'\
          \ if torch.cuda.is_available() else 'cpu')\n    print(f\"\\n Device: {device}\"\
          )\n    if device.type == 'cuda':\n        print(f\"   GPU: {torch.cuda.get_device_name(0)}\"\
          )\n\n    # Data transforms\n    train_transforms = transforms.Compose([\n\
          \        transforms.Resize(256),\n        transforms.RandomCrop(224),\n\
          \        transforms.RandomHorizontalFlip(),\n        transforms.ToTensor(),\n\
          \        transforms.Normalize([0.485, 0.456, 0.406], [0.229, 0.224, 0.225])\n\
          \    ])\n\n    val_transforms = transforms.Compose([\n        transforms.Resize(256),\n\
          \        transforms.CenterCrop(224),\n        transforms.ToTensor(),\n \
          \       transforms.Normalize([0.485, 0.456, 0.406], [0.229, 0.224, 0.225])\n\
          \    ])\n\n    # Load datasets\n    print(\"\\n Loading datasets...\")\n\
          \    train_dataset = datasets.ImageFolder(os.path.join(data_dir, 'train'),\n\
          \                                        transform=train_transforms)\n \
          \   val_dataset = datasets.ImageFolder(os.path.join(data_dir, 'val'),\n\
          \                                      transform=val_transforms)\n\n   \
          \ train_loader = DataLoader(train_dataset, batch_size=batch_size,\n    \
          \                         shuffle=True, num_workers=0)\n    val_loader =\
          \ DataLoader(val_dataset, batch_size=batch_size,\n                     \
          \      shuffle=False, num_workers=0)\n\n    print(f\"   Train batches: {len(train_loader)}\"\
          )\n    print(f\"   Val batches: {len(val_loader)}\")\n\n    # Initialize\
          \ model\n    print(\"\\n Building model...\")\n    model = DogBreedClassifier(num_classes=num_classes,\
          \ pretrained=use_pretrained)\n    model = model.to(device)\n\n    criterion\
          \ = nn.CrossEntropyLoss()\n    optimizer = optim.Adam(model.parameters(),\
          \ lr=learning_rate)\n\n    # Training loop\n    print(\"\\n Training started...\\\
          n\")\n    metrics = []\n    best_val_acc = 0.0\n\n    for epoch in range(epochs):\n\
          \        print(f\"Epoch {epoch+1}/{epochs}\")\n        print(\"-\" * 50)\n\
          \n        # Training phase\n        model.train()\n        train_loss =\
          \ 0.0\n        train_correct = 0\n        train_total = 0\n\n        for\
          \ inputs, labels in train_loader:\n            inputs, labels = inputs.to(device),\
          \ labels.to(device)\n\n            optimizer.zero_grad()\n            outputs\
          \ = model(inputs)\n            loss = criterion(outputs, labels)\n     \
          \       loss.backward()\n            optimizer.step()\n\n            train_loss\
          \ += loss.item() * inputs.size(0)\n            _, predicted = outputs.max(1)\n\
          \            train_total += labels.size(0)\n            train_correct +=\
          \ predicted.eq(labels).sum().item()\n\n        train_loss = train_loss /\
          \ train_total\n        train_acc = 100.0 * train_correct / train_total\n\
          \n        # Validation phase\n        model.eval()\n        val_loss = 0.0\n\
          \        val_correct = 0\n        val_total = 0\n\n        with torch.no_grad():\n\
          \            for inputs, labels in val_loader:\n                inputs,\
          \ labels = inputs.to(device), labels.to(device)\n\n                outputs\
          \ = model(inputs)\n                loss = criterion(outputs, labels)\n\n\
          \                val_loss += loss.item() * inputs.size(0)\n            \
          \    _, predicted = outputs.max(1)\n                val_total += labels.size(0)\n\
          \                val_correct += predicted.eq(labels).sum().item()\n\n  \
          \      val_loss = val_loss / val_total\n        val_acc = 100.0 * val_correct\
          \ / val_total\n\n        # Print metrics\n        print(f\"  Train Loss:\
          \ {train_loss:.4f} | Train Acc: {train_acc:.2f}%\")\n        print(f\" \
          \ Val Loss:   {val_loss:.4f} | Val Acc:   {val_acc:.2f}%\")\n\n        #\
          \ Save metrics\n        metrics.append({\n            'epoch': epoch + 1,\n\
          \            'train_loss': train_loss,\n            'train_acc': train_acc,\n\
          \            'val_loss': val_loss,\n            'val_acc': val_acc\n   \
          \     })\n\n        # Save best model\n        if val_acc > best_val_acc:\n\
          \            best_val_acc = val_acc\n            best_model_path = os.path.join(model_dir,\
          \ 'best_model.pth')\n            torch.save({\n                'epoch':\
          \ epoch + 1,\n                'model_state_dict': model.state_dict(),\n\
          \                'optimizer_state_dict': optimizer.state_dict(),\n     \
          \           'val_acc': val_acc,\n                'class_names': train_dataset.classes\n\
          \            }, best_model_path)\n            print(f\"   Saved best model\
          \ (Val Acc: {val_acc:.2f}%)\")\n\n        print()\n\n    # Save final model\n\
          \    final_model_path = os.path.join(model_dir, 'final_model.pth')\n   \
          \ torch.save({\n        'epoch': epochs,\n        'model_state_dict': model.state_dict(),\n\
          \        'optimizer_state_dict': optimizer.state_dict(),\n        'class_names':\
          \ train_dataset.classes\n    }, final_model_path)\n\n    # Save metrics\n\
          \    metrics_path = os.path.join(model_dir, 'metrics.json')\n    with open(metrics_path,\
          \ 'w') as f:\n        json.dump({\n            'metrics': metrics,\n   \
          \         'best_val_acc': best_val_acc,\n            'num_classes': num_classes,\n\
          \            'class_names': train_dataset.classes,\n            'hyperparameters':\
          \ {\n                'epochs': epochs,\n                'batch_size': batch_size,\n\
          \                'learning_rate': learning_rate,\n                'use_pretrained':\
          \ use_pretrained\n            }\n        }, f, indent=2)\n\n    # Save class\
          \ names\n    class_names_path = os.path.join(model_dir, 'class_names.txt')\n\
          \    with open(class_names_path, 'w') as f:\n        f.write('\\n'.join(train_dataset.classes))\n\
          \n    print(\"=\" * 70)\n    print(\" TRAINING COMPLETE!\")\n    print(f\"\
          \   Best Validation Accuracy: {best_val_acc:.2f}%\")\n    print(f\"   Models\
          \ saved to: {model_dir}\")\n    print(f\"   Completed: {datetime.now()}\"\
          )\n    print(\"=\" * 70)\n\n    # Log metrics for KFP UI visualization\n\
          \    if metrics_out is not None:\n        metrics_out.log_metric('best_val_accuracy',\
          \ float(best_val_acc))\n        metrics_out.log_metric('final_train_accuracy',\
          \ float(metrics[-1]['train_acc']))\n        metrics_out.log_metric('final_val_accuracy',\
          \ float(metrics[-1]['val_acc']))\n        metrics_out.log_metric('final_train_loss',\
          \ float(metrics[-1]['train_loss']))\n        metrics_out.log_metric('final_val_loss',\
          \ float(metrics[-1]['val_loss']))\n        metrics_out.log_metric('num_epochs',\
          \ epochs)\n\n"
        image: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
        resources:
          cpuLimit: 4.0
          memoryLimit: 8.589934592
          resourceCpuLimit: '4'
          resourceMemoryLimit: 8Gi
pipelineInfo:
  description: Train a CNN model to classify dog breeds on OpenShift AI
  name: dog-breed-classifier-training
root:
  dag:
    tasks:
      train-dog-classifier:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-dog-classifier
        inputs:
          parameters:
            batch_size:
              componentInputParameter: batch_size
            data_dir:
              runtimeValue:
                constant: /pvc/data
            epochs:
              componentInputParameter: epochs
            learning_rate:
              componentInputParameter: learning_rate
            model_dir:
              runtimeValue:
                constant: /pvc/models
            use_pretrained:
              componentInputParameter: use_pretrained
        taskInfo:
          name: train-dog-classifier
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 32.0
        description: Training batch size
        isOptional: true
        parameterType: NUMBER_INTEGER
      epochs:
        defaultValue: 10.0
        description: Number of training epochs
        isOptional: true
        parameterType: NUMBER_INTEGER
      learning_rate:
        defaultValue: 0.001
        description: Optimizer learning rate
        isOptional: true
        parameterType: NUMBER_DOUBLE
      pvc_name:
        defaultValue: kfp-pvc-1
        description: Name of PVC for data and model storage
        isOptional: true
        parameterType: STRING
      use_pretrained:
        defaultValue: true
        description: Use ImageNet pretrained weights
        isOptional: true
        parameterType: BOOLEAN
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-train-dog-classifier:
          pvcMount:
          - componentInputParameter: pvc_name
            mountPath: /pvc
            pvcNameParameter:
              componentInputParameter: pvc_name
